<svg viewBox="0 0 270 540" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="270" height="540" fill="#0A0A0A"/>

  <!-- Dynamic Island -->
  <rect x="96" y="12" width="78" height="20" rx="10" fill="#1A1A1A"/>

  <!-- Hero image area -->
  <defs>
    <linearGradient id="coffeeGrad1" x1="0" y1="36" x2="270" y2="230" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3D1F08"/>
      <stop offset="100%" stop-color="#0A0500"/>
    </linearGradient>
    <linearGradient id="imgFade1" x1="0" y1="36" x2="0" y2="226" gradientUnits="userSpaceOnUse">
      <stop offset="55%" stop-color="#0A0500" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0A0A0A" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="36" width="270" height="190" fill="url(#coffeeGrad1)"/>

  <!-- Coffee cup icon -->
  <g transform="translate(88,68)">
    <path d="M15 28 L15 70 Q15 80 27 80 L67 80 Q79 80 79 70 L79 28 Z" fill="none" stroke="#D98E4A" stroke-width="2.2" opacity="0.85"/>
    <path d="M79 40 Q96 40 96 56 Q96 72 79 72" fill="none" stroke="#D98E4A" stroke-width="2.2" opacity="0.85"/>
    <path d="M28 26 Q32 15 28 7" fill="none" stroke="#D98E4A" stroke-width="1.6" opacity="0.5" stroke-linecap="round"/>
    <path d="M47 24 Q51 13 47 5" fill="none" stroke="#D98E4A" stroke-width="1.6" opacity="0.5" stroke-linecap="round"/>
    <path d="M66 26 Q70 15 66 7" fill="none" stroke="#D98E4A" stroke-width="1.6" opacity="0.5" stroke-linecap="round"/>
  </g>
  <rect x="0" y="36" width="270" height="190" fill="url(#imgFade1)"/>

  <!-- Match score badge -->
  <rect x="16" y="212" width="92" height="30" rx="15" fill="#D98E4A"/>
  <text x="62" y="231" fill="#000000" font-size="13" font-family="system-ui,sans-serif" text-anchor="middle" font-weight="700">9.2 match</text>

  <!-- Bookmark icon -->
  <rect x="232" y="212" width="30" height="30" rx="15" fill="#1A1A1A"/>
  <path d="M240.5 219.5 L240.5 237 L247 233 L253.5 237 L253.5 219.5 Z" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Shop name -->
  <text x="16" y="264" fill="#FFFFFF" font-size="18" font-family="system-ui,sans-serif" font-weight="700">Onyx Coffee Lab</text>
  <text x="16" y="282" fill="#555555" font-size="11" font-family="system-ui,sans-serif">0.3 mi · Specialty · Pour Over</text>

  <!-- Taste tags -->
  <rect x="16" y="294" width="74" height="23" rx="11.5" fill="#1A1A1A"/>
  <text x="53" y="309" fill="#D98E4A" font-size="10" font-family="system-ui,sans-serif" text-anchor="middle">Chocolate</text>
  <rect x="98" y="294" width="56" height="23" rx="11.5" fill="#1A1A1A"/>
  <text x="126" y="309" fill="#D98E4A" font-size="10" font-family="system-ui,sans-serif" text-anchor="middle">Floral</text>
  <rect x="162" y="294" width="54" height="23" rx="11.5" fill="#1A1A1A"/>
  <text x="189" y="309" fill="#D98E4A" font-size="10" font-family="system-ui,sans-serif" text-anchor="middle">Citrus</text>

  <!-- Divider -->
  <line x1="16" y1="328" x2="254" y2="328" stroke="#1E1E1E" stroke-width="1"/>

  <!-- Match breakdown -->
  <text x="16" y="347" fill="#555555" font-size="10" font-family="system-ui,sans-serif" font-weight="600" letter-spacing="1.5">WHY IT MATCHES YOU</text>

  <!-- Espresso bar -->
  <text x="16" y="368" fill="#444444" font-size="11" font-family="system-ui,sans-serif">Espresso</text>
  <rect x="88" y="361" width="142" height="5" rx="2.5" fill="#1E1E1E"/>
  <rect x="88" y="361" width="128" height="5" rx="2.5" fill="#D98E4A"/>
  <text x="244" y="368" fill="#CCCCCC" font-size="11" font-family="system-ui,sans-serif" text-anchor="end">9.0</text>

  <!-- Ambiance bar -->
  <text x="16" y="387" fill="#444444" font-size="11" font-family="system-ui,sans-serif">Ambiance</text>
  <rect x="88" y="380" width="142" height="5" rx="2.5" fill="#1E1E1E"/>
  <rect x="88" y="380" width="114" height="5" rx="2.5" fill="#D98E4A"/>
  <text x="244" y="387" fill="#CCCCCC" font-size="11" font-family="system-ui,sans-serif" text-anchor="end">8.0</text>

  <!-- Wifi bar -->
  <text x="16" y="406" fill="#444444" font-size="11" font-family="system-ui,sans-serif">Wifi / Work</text>
  <rect x="88" y="399" width="142" height="5" rx="2.5" fill="#1E1E1E"/>
  <rect x="88" y="399" width="135" height="5" rx="2.5" fill="#D98E4A"/>
  <text x="244" y="406" fill="#CCCCCC" font-size="11" font-family="system-ui,sans-serif" text-anchor="end">9.5</text>

  <!-- See full review button -->
  <rect x="16" y="420" width="238" height="36" rx="18" fill="#1A1A1A"/>
  <text x="135" y="443" fill="#FFFFFF" font-size="13" font-family="system-ui,sans-serif" text-anchor="middle">See full review</text>

  <!-- Bottom nav -->
  <rect x="0" y="484" width="270" height="56" fill="#0A0A0A"/>
  <line x1="0" y1="484" x2="270" y2="484" stroke="#1A1A1A" stroke-width="1"/>
  <!-- Feed (active) -->
  <rect x="22" y="500" width="18" height="16" rx="2" fill="none" stroke="#D98E4A" stroke-width="1.6"/>
  <line x1="22" y1="506" x2="40" y2="506" stroke="#D98E4A" stroke-width="1"/>
  <line x1="22" y1="510" x2="36" y2="510" stroke="#D98E4A" stroke-width="1"/>
  <!-- Map -->
  <path d="M79 498 L88 494 L97 498 L97 514 L88 518 L79 514 Z" fill="none" stroke="#2E2E2E" stroke-width="1.6"/>
  <!-- Search -->
  <circle cx="135" cy="507" r="6" fill="none" stroke="#2E2E2E" stroke-width="1.6"/>
  <line x1="139.5" y1="511.5" x2="144" y2="516" stroke="#2E2E2E" stroke-width="1.6"/>
  <!-- Saved -->
  <path d="M182 496 L182 518 L190 513 L198 518 L198 496 Z" fill="none" stroke="#2E2E2E" stroke-width="1.6" stroke-linejoin="round"/>
  <!-- Profile -->
  <circle cx="242" cy="503" r="5" fill="none" stroke="#2E2E2E" stroke-width="1.6"/>
  <path d="M234 518 Q234 511 242 511 Q250 511 250 518" fill="none" stroke="#2E2E2E" stroke-width="1.6"/>
</svg>
